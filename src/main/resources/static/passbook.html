<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passbook - Virtual Banking System</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    body{
        font-family:'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0a1628 0%, #1a2847 50%, #2d1b4e 100%);
        min-height:100vh;
        padding:20px;
        position: relative;
        overflow-x: hidden;
    }

    body::before {
        content: '';
        position: fixed;
        top: -50%;
        right: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(102, 126, 234, 0.15) 0%, transparent 70%);
        pointer-events: none;
        z-index: -1;
        animation: float 20s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(30px, 30px); }
    }

    .container{
        max-width:1000px;
        margin:auto;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(30px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius:24px;
        box-shadow:
            0 0 60px rgba(102, 126, 234, 0.2),
            inset 0 1px 0 rgba(255, 255, 255, 0.1);
        overflow:hidden
    }

    .header{
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
        backdrop-filter: blur(20px);
        padding:30px;
        color:#fff;
        display:flex;
        justify-content:space-between;
        align-items:center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        position: relative;
    }

    .header::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.5), transparent);
    }

    .header-left h1{
        font-size:32px;
        font-weight: 800;
        background: linear-gradient(135deg, #667eea 0%, #a78bfa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .header-left p{
        font-size:13px;
        opacity:.7;
        letter-spacing: 1px;
        font-weight: 500;
    }

    .btn-header{
        padding:10px 24px;
        border: 1.5px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        color:#fff;
        border-radius:12px;
        cursor:pointer;
        font-weight:600;
        text-decoration:none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        min-height: 42px;
    }

    .btn-header:hover{
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.3);
        box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
        transform: translateY(-2px);
    }

    .header > div {
        display: flex;
        gap: 12px;
        align-items: center;
    }

    .content{padding:50px 40px}

    .passbook-header{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:50px;
        flex-wrap: wrap;
        gap: 30px;
    }

    .passbook-header h2 {
        color: white;
        font-size: 32px;
        font-weight: 700;
    }

    .balance-card{
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.25) 0%, rgba(168, 139, 250, 0.25) 100%);
        backdrop-filter: blur(20px);
        color:#fff;
        padding:40px;
        border-radius:20px;
        border: 1.5px solid rgba(167, 139, 250, 0.3);
        box-shadow:
            0 0 40px rgba(102, 126, 234, 0.3),
            inset 0 1px 0 rgba(255, 255, 255, 0.1);
        position: relative;
        overflow: hidden;
        min-width: 280px;
    }

    .balance-card::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
        pointer-events: none;
    }

    .balance-card p {
        font-size: 13px;
        opacity: 0.85;
        margin-bottom: 12px;
        letter-spacing: 1px;
        font-weight: 500;
    }

    .balance-card .amount{
        font-size:48px;
        font-weight: 800;
        background: linear-gradient(135deg, #ffffff 0%, #a78bfa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .transactions-section{
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        padding:30px;
        border-radius:20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .transactions-section h3 {
        color: white;
        margin-bottom: 20px;
        font-size: 18px;
        font-weight: 700;
    }

    .transactions-list{
        display:flex;
        flex-direction:column;
        gap:10px
    }

    .transaction-item{
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        padding:18px;
        border-radius:12px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        border-left:3px solid rgba(167, 139, 250, 0.5);
        box-shadow: 0 0 20px rgba(102, 126, 234, 0.1);
        transition: all 0.3s;
    }

    .transaction-item:hover {
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 30px rgba(102, 126, 234, 0.2);
    }

    .transaction-item.deposit{border-left-color:rgba(67, 233, 123, 0.6)}
    .transaction-item.withdrawal{border-left-color:rgba(245, 87, 108, 0.6)}
    .transaction-item.transfer{border-left-color:rgba(79, 172, 254, 0.6)}

    .transaction-info{
        display:flex;
        gap:15px;
        align-items:center
    }

    .transaction-icon{
        width:45px;
        height:45px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:22px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .deposit .transaction-icon{
        background: linear-gradient(135deg, rgba(67, 233, 123, 0.3) 0%, rgba(56, 249, 215, 0.3) 100%);
        color:#00ff88;
        border-color: rgba(67, 233, 123, 0.5);
    }

    .withdrawal .transaction-icon{
        background: linear-gradient(135deg, rgba(245, 87, 108, 0.3) 0%, rgba(240, 147, 251, 0.3) 100%);
        color:#ff6b9d;
        border-color: rgba(245, 87, 108, 0.5);
    }

    .transfer .transaction-icon{
        background: linear-gradient(135deg, rgba(79, 172, 254, 0.3) 0%, rgba(0, 242, 254, 0.3) 100%);
        color:#00d4ff;
        border-color: rgba(79, 172, 254, 0.5);
    }

    .transaction-details .type{
        font-weight:600;
        color:#fff;
        font-size: 15px;
    }

    .transaction-details .date{
        font-size:12px;
        color:rgba(255, 255, 255, 0.5);
        margin-top: 4px;
    }

    .transaction-right{text-align:right}

    .transaction-amount{
        font-size:16px;
        font-weight:700;
    }

    .deposit .transaction-amount{color:#00ff88}
    .withdrawal .transaction-amount{color:#ff6b9d}
    .transfer .transaction-amount{color:#00d4ff}

    .balance-display{
        font-size:12px;
        color:rgba(255, 255, 255, 0.5);
        margin-top: 4px;
    }

    .pagination{
        margin-top:30px;
        display:flex;
        justify-content:center;
        gap:10px;
        flex-wrap: wrap;
    }

    .pagination button{
        padding:10px 16px;
        border: 1.5px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        border-radius:10px;
        cursor:pointer;
        font-weight: 600;
        transition: all 0.3s;
        color: rgba(255, 255, 255, 0.8);
        font-family: 'Manrope', sans-serif;
        font-size: 14px;
    }

    .pagination button:hover {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(167, 139, 250, 0.5);
        color: white;
    }

    .pagination .active{
        background: linear-gradient(135deg, #667eea 0%, #a78bfa 100%);
        color:#fff;
        border-color: transparent;
    }

    .empty-state {
        text-align: center;
        color: rgba(255, 255, 255, 0.5);
        padding: 40px 20px;
        font-size: 14px;
    }

    .message{display:none;margin-bottom:20px}
    .message.show{display:block}

    @media (max-width: 768px) {
        .content{padding:30px 20px}

        .passbook-header {
            flex-direction: column;
            align-items: flex-start;
            gap: 20px;
        }

        .passbook-header h2 {
            font-size: 24px;
        }

        .balance-card {
            padding: 30px 25px;
            min-width: 100%;
        }

        .balance-card .amount {
            font-size: 36px;
        }

        .transaction-item{
            flex-direction:column;
            align-items:flex-start;
            gap: 12px;
        }

        .transaction-right {
            align-self: flex-end;
            width: 100%;
            text-align: right;
        }

        .header {
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }

        .header > div {
            width: 100%;
            justify-content: center;
        }
    }

    @media (max-width: 480px) {
        body {
            padding: 10px;
        }

        .container {
            border-radius: 16px;
        }

        .content {
            padding: 20px 15px;
        }

        .balance-card {
            padding: 25px 20px;
        }

        .balance-card .amount {
            font-size: 28px;
        }

        .transactions-section {
            padding: 20px;
        }

        .transaction-item {
            padding: 14px;
        }
    }
  </style>
</head>

<body>
<div class="container">

  <div class="header">
    <div class="header-left">
      <h1>VBS</h1>
      <p>Virtual Banking System</p>
    </div>
    <div>
      <a id="dashLink" class="btn-header">← Dashboard</a>
      <button class="btn-header" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="content">

    <div class="passbook-header">
      <h2>Your Passbook</h2>
      <div class="balance-card">
        <p>Current Balance</p>
        <div class="amount">₹<span id="currentBalance">0.00</span></div>
      </div>
    </div>

    <div class="transactions-section">
      <h3>Transaction History</h3>
      <div id="transactionsList" class="transactions-list"></div>
      <div id="paginationControls" class="pagination"></div>
    </div>

  </div>
</div>

<script>
  const API_URL = 'http://localhost:8081';
  let userId, role;
  let transactions = [];
  let currentPage = 1;
  const itemsPerPage = 10;

  function getUserIdFromURL(){
      const p = new URLSearchParams(window.location.search);
      userId = p.get('id');
      role = p.get('role') || 'customer';
      if(!userId) location.href='login.html';
      document.getElementById('dashLink').href =
          `dashboard.html?id=${userId}&role=${encodeURIComponent(role)}`;
  }

  async function loadPassbook(){
      const r = await fetch(`${API_URL}/passbook/${userId}`);
      transactions = await r.json();
      if(transactions.length)
          document.getElementById('currentBalance').textContent =
              transactions[transactions.length-1].currBalance.toFixed(2);
      render();
  }

  function getType(d){
      d=d.toLowerCase();
      if(d.includes('deposit')) return 'deposit';
      if(d.includes('withdrawal')) return 'withdrawal';
      return 'transfer';
  }

  function render(){
      const list = document.getElementById('transactionsList');
      const pag = document.getElementById('paginationControls');

      const sorted=[...transactions].sort((a,b)=>new Date(b.date)-new Date(a.date));
      const totalPages=Math.ceil(sorted.length/itemsPerPage);
      const slice=sorted.slice((currentPage-1)*itemsPerPage,currentPage*itemsPerPage);

      list.innerHTML=slice.map(t=>{
          const type = getType(t.description);

          let sign = '-';
          if(type === 'deposit') sign = '+';
          else if(type === 'transfer' && t.description.toLowerCase().includes('received'))
              sign = '+';

          const icon = type==='deposit'?'📥':type==='withdrawal'?'💸':'🔁';

          return `
          <div class="transaction-item ${type}">
              <div class="transaction-info">
                  <div class="transaction-icon">${icon}</div>
                  <div class="transaction-details">
                      <div class="type">${t.description}</div>
                      <div class="date">${new Date(t.date).toLocaleString('en-IN')}</div>
                  </div>
              </div>
              <div class="transaction-right">
                  <div class="transaction-amount">${sign}₹${t.amount.toFixed(2)}</div>
                  <div class="balance-display">Balance ₹${t.currBalance.toFixed(2)}</div>
              </div>
          </div>`;
      }).join('');

      pag.innerHTML='';
      for(let i=1;i<=totalPages;i++){
          pag.innerHTML+=`<button class="${i===currentPage?'active':''}" onclick="go(${i})">${i}</button>`;
      }
  }

  function go(p){currentPage=p;render()}
  function logout(){location.href='home.html'}

  window.onload=()=>{
      getUserIdFromURL();
      loadPassbook();
  }
</script>
</body>
</html>
