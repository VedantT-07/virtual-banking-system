<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Banking System - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2847 50%, #2d1b4e 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background glow effect */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow:
                0 0 60px rgba(102, 126, 234, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
            backdrop-filter: blur(20px);
            padding: 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.5), transparent);
        }

        .header-left h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #667eea 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-left p {
            font-size: 13px;
            opacity: 0.7;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .logout-btn {
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        .content {
            padding: 50px 40px;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .dashboard-header h2 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .dashboard-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .user-info {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-info p {
            color: rgba(255, 255, 255, 0.7);
            margin: 8px 0;
            font-size: 14px;
        }

        .user-info strong {
            color: #a78bfa;
            font-weight: 600;
        }

        .account-balance {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.25) 0%, rgba(168, 139, 250, 0.25) 100%);
            backdrop-filter: blur(20px);
            color: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 50px;
            border: 1.5px solid rgba(167, 139, 250, 0.3);
            box-shadow:
                0 0 40px rgba(102, 126, 234, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .account-balance::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .account-balance p {
            font-size: 13px;
            opacity: 0.85;
            margin-bottom: 15px;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .balance-amount {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .transaction-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .btn {
            padding: 28px 20px;
            border: none;
            border-radius: 18px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 22px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .btn-withdraw {
            border-color: rgba(245, 87, 108, 0.3);
        }

        .btn-withdraw .btn-icon {
            background: linear-gradient(135deg, rgba(245, 87, 108, 0.3) 0%, rgba(240, 147, 251, 0.3) 100%);
            border-color: rgba(245, 87, 108, 0.5);
            color: #ff6b9d;
        }

        .btn-withdraw:hover {
            background: rgba(245, 87, 108, 0.15);
            border-color: rgba(245, 87, 108, 0.5);
            box-shadow: 0 12px 40px rgba(245, 87, 108, 0.3);
            transform: translateY(-4px);
        }

        .btn-withdraw:hover .btn-icon {
            box-shadow: 0 8px 24px rgba(245, 87, 108, 0.4);
        }

        .btn-deposit {
            border-color: rgba(79, 172, 254, 0.3);
        }

        .btn-deposit .btn-icon {
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.3) 0%, rgba(0, 242, 254, 0.3) 100%);
            border-color: rgba(79, 172, 254, 0.5);
            color: #00d4ff;
        }

        .btn-deposit:hover {
            background: rgba(79, 172, 254, 0.15);
            border-color: rgba(79, 172, 254, 0.5);
            box-shadow: 0 12px 40px rgba(79, 172, 254, 0.3);
            transform: translateY(-4px);
        }

        .btn-deposit:hover .btn-icon {
            box-shadow: 0 8px 24px rgba(79, 172, 254, 0.4);
        }

        .btn-transfer {
            border-color: rgba(67, 233, 123, 0.3);
        }

        .btn-transfer .btn-icon {
            background: linear-gradient(135deg, rgba(67, 233, 123, 0.3) 0%, rgba(56, 249, 215, 0.3) 100%);
            border-color: rgba(67, 233, 123, 0.5);
            color: #00ff88;
        }

        .btn-transfer:hover {
            background: rgba(67, 233, 123, 0.15);
            border-color: rgba(67, 233, 123, 0.5);
            box-shadow: 0 12px 40px rgba(67, 233, 123, 0.3);
            transform: translateY(-4px);
        }

        .btn-transfer:hover .btn-icon {
            box-shadow: 0 8px 24px rgba(67, 233, 123, 0.4);
        }

        .btn-passbook {
            border-color: rgba(251, 191, 36, 0.3);
        }

        .btn-passbook .btn-icon {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.3) 0%, rgba(245, 158, 11, 0.3) 100%);
            border-color: rgba(251, 191, 36, 0.5);
            color: #fbbf24;
        }

        .btn-passbook:hover {
            background: rgba(251, 191, 36, 0.15);
            border-color: rgba(251, 191, 36, 0.5);
            box-shadow: 0 12px 40px rgba(251, 191, 36, 0.3);
            transform: translateY(-4px);
        }

        .btn-passbook:hover .btn-icon {
            box-shadow: 0 8px 24px rgba(251, 191, 36, 0.4);
        }

        .btn-profile {
            border-color: rgba(168, 139, 250, 0.3);
        }

        .btn-profile .btn-icon {
            background: linear-gradient(135deg, rgba(168, 139, 250, 0.3) 0%, rgba(167, 139, 250, 0.3) 100%);
            border-color: rgba(168, 139, 250, 0.5);
            color: #d8b4fe;
        }

        .btn-profile:hover {
            background: rgba(168, 139, 250, 0.15);
            border-color: rgba(168, 139, 250, 0.5);
            box-shadow: 0 12px 40px rgba(168, 139, 250, 0.3);
            transform: translateY(-4px);
        }

        .btn-profile:hover .btn-icon {
            box-shadow: 0 8px 24px rgba(168, 139, 250, 0.4);
        }

        .transactions-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .transactions-section h3 {
            color: white;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 700;
        }

        .transaction-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid rgba(167, 139, 250, 0.5);
        }

        .transaction-info p {
            margin: 3px 0;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .transaction-info .type {
            color: white;
            font-weight: 600;
        }

        .transaction-info .date {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        .transaction-amount {
            font-weight: 700;
            font-size: 16px;
        }

        .transaction-amount.debit {
            color: #ff6b9d;
        }

        .transaction-amount.credit {
            color: #00ff88;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px);
            padding: 40px;
            border-radius: 20px;
            max-width: 420px;
            width: 90%;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .modal-header {
            font-size: 22px;
            font-weight: 700;
            color: white;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            color: white;
            font-family: 'Manrope', sans-serif;
        }

        .form-group input::placeholder,
        .form-group select {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: rgba(167, 139, 250, 0.6);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        .form-group select option {
            background: #1a1a2e;
            color: white;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        .btn-modal {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 14px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #a78bfa 100%);
            color: white;
            border: 1.5px solid transparent;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.4);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            border: 1.5px solid rgba(255, 255, 255, 0.2);
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .message {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        .message.success {
            background: rgba(34, 197, 94, 0.15);
            color: #86efac;
            border: 1.5px solid rgba(34, 197, 94, 0.3);
        }

        .message.error {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1.5px solid rgba(239, 68, 68, 0.3);
        }

        .message.show {
            display: block;
        }

        .empty-state {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 40px 20px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .content {
                padding: 30px 20px;
            }

            .transaction-buttons {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .header-left h1 {
                font-size: 28px;
            }

            .dashboard-header h2 {
                font-size: 24px;
            }

            .balance-amount {
                font-size: 36px;
            }

            .transaction-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .transaction-amount {
                align-self: flex-end;
            }

            .modal-content {
                padding: 30px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .container {
                border-radius: 16px;
            }

            .content {
                padding: 20px 15px;
            }

            .transaction-buttons {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .btn {
                padding: 24px 16px;
            }

            .header-left h1 {
                font-size: 24px;
            }

            .dashboard-header h2 {
                font-size: 20px;
            }

            .account-balance {
                padding: 30px 20px;
            }

            .balance-amount {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <h1>VBS</h1>
            <p>Virtual Banking System</p>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="content">

        <div class="dashboard-header">
            <h2 id="welcomeText">Welcome</h2>
            <p>User ID: <strong><span id="userId">-</span></strong></p>
        </div>

        <div id="dashMessage" class="message"></div>

        <div class="account-balance">
            <p>Available Balance</p>
            <div class="balance-amount">₹ <span id="balance">0.00</span></div>
        </div>

        <div class="transaction-buttons">
            <button class="btn btn-action btn-withdraw" onclick="openWithdrawModal()">
                <div class="btn-icon">↓</div>
                <span>Withdraw</span>
            </button>

            <button class="btn btn-action btn-deposit" onclick="openDepositModal()">
                <div class="btn-icon">↑</div>
                <span>Deposit</span>
            </button>

            <button class="btn btn-action btn-transfer" onclick="openTransferModal()">
                <div class="btn-icon">⇄</div>
                <span>Transfer</span>
            </button>

            <button class="btn btn-action btn-passbook" onclick="goToPassbook()">
                <div class="btn-icon">📖</div>
                <span>Passbook</span>
            </button>

            <button class="btn btn-action btn-profile btn-passbook" onclick="openUpdateModal()">
                <div class="btn-icon">👤</div>
                <span>Profile</span>
            </button>
        </div>
    </div>
</div>


<div id="withdrawModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Withdraw Funds</div>
        <form id="withdrawForm">
            <div class="form-group">
                <label>Amount</label>
                <input type="number" id="withdrawAmount" step="0.01" min="0" required>
            </div>

            <div class="modal-buttons">
                <button type="button" class="btn-modal btn-cancel" onclick="closeWithdrawModal()">Cancel</button>
                <button type="submit" class="btn-modal btn-submit">Withdraw</button>
            </div>
        </form>
    </div>
</div>


<div id="depositModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Deposit Funds</div>
        <form id="depositForm">
            <div class="form-group">
                <label>Amount</label>
                <input type="number" id="depositAmount" step="0.01" min="0" required>
            </div>

            <div class="modal-buttons">
                <button type="button" class="btn-modal btn-cancel" onclick="closeDepositModal()">Cancel</button>
                <button type="submit" class="btn-modal btn-submit">Deposit</button>
            </div>
        </form>
    </div>
</div>
<div id="updateModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Update Profile</div>
        <form id="updateForm">
            <div class="form-group">
                <label>Field</label>
                <select id="updateKey" required>
                    <option value="name">Name</option>
                    <option value="password">Password</option>
                    <option value="email">Email</option>
                </select>
            </div>
            <div class="form-group">
                <label>New Value</label>
                <input type="text" id="updateValue" required>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-modal btn-cancel" onclick="closeUpdateModal()">Cancel</button>
                <button type="submit" class="btn-modal btn-submit">Update</button>
            </div>
        </form>
    </div>
</div>

<div id="transferModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">Transfer Funds</div>
        <form id="transferForm">
            <div class="form-group">
                <label>Recipient Username</label>
                <input type="text" id="transferUsername" required>
            </div>
            <div class="form-group">
                <label>Amount</label>
                <input type="number" id="transferAmount" step="0.01" min="0" required>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-modal btn-cancel" onclick="closeTransferModal()">Cancel</button>
                <button type="submit" class="btn-modal btn-submit">Send</button>
            </div>
        </form>
    </div>
</div>


<script>
    const API_URL = 'http://localhost:8081';
    let userId = null;
    let role = 'customer';
    function getUserIdFromURL() {
        const params = new URLSearchParams(window.location.search);
        userId = params.get('id');
        role = params.get('role') || 'customer';

        if (!userId) {
            window.location.href = 'login.html';
        }
    }

    async function loadDashboard() {
        document.getElementById('userId').textContent = userId;

        try {
            const res = await fetch(`${API_URL}/get-details/${userId}`);
            const data = await res.json();

            if (document.getElementById('welcomeText')) {
                document.getElementById('welcomeText').textContent =
                    `Welcome ${data.username}`;
            }

            if (document.getElementById('balance')) {
                document.getElementById('balance').textContent =
                    data.balance.toFixed(2);
            }
        } catch {
            showMessage('dashMessage', 'Failed to load dashboard', 'error');
        }
    }

    function openWithdrawModal() {
        document.getElementById('withdrawModal').classList.add('show');
    }

    function closeWithdrawModal() {
        document.getElementById('withdrawModal').classList.remove('show');
        document.getElementById('withdrawForm').reset();
    }

    function openDepositModal() {
        document.getElementById('depositModal').classList.add('show');
    }

    function closeDepositModal() {
        document.getElementById('depositModal').classList.remove('show');
        document.getElementById('depositForm').reset();
    }

    function openTransferModal() {
        document.getElementById('transferModal').classList.add('show');
    }

    function closeTransferModal() {
        document.getElementById('transferModal').classList.remove('show');
        document.getElementById('transferForm').reset();
    }

    function showMessage(elementId, message, type) {
        const messageEl = document.getElementById(elementId);
        messageEl.textContent = message;
        messageEl.className = `message ${type} show`;
        setTimeout(() => {
            messageEl.classList.remove('show');
        }, 3000);
    }

    const withdrawForm = document.getElementById('withdrawForm');
    if (withdrawForm) {
        withdrawForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const withdrawData = {
                id: parseInt(userId),
                amount: parseFloat(document.getElementById('withdrawAmount').value)
            };

            try {
                const response = await fetch(`${API_URL}/withdraw`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(withdrawData)
                });
                const result = await response.text();

                if (result && result.toLowerCase().includes('withdrawal')) {
                    showMessage('dashMessage', 'Withdrawal successful!', 'success');
                    closeWithdrawModal();
                    loadDashboard();
                } else {
                    showMessage('dashMessage', result || 'Withdrawal failed', 'error');
                }
            } catch (error) {
                showMessage('dashMessage', 'Error processing withdrawal', 'error');
                console.error(error);
            }
        });
    }

    const transferForm = document.getElementById('transferForm');

            const transferData = {

                amount: parseFloat(document.getElementById('transferAmount').value),
                username: document.getElementById('transferUsername').value
            };

            if (!transferData.username) {
                showMessage('dashMessage', 'Enter recipient username.', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/transfer`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(transferData)
                });
                const result = await response.text();

                if (response.ok && result && result.toLowerCase().includes('successfully')) {
                    showMessage('dashMessage', 'Transfer successful!', 'success');
                    closeTransferModal();

                } else {
                    showMessage('dashMessage', result || 'Transfer failed', 'error');

                console.error(error);
            }
        });

    function logout() {
        window.location.href = 'home.html';
    }
    function validateUserAccess() {
    const storedUserId = localStorage.getItem("userId");
    const storedRole = localStorage.getItem("role") || "customer";

    const params = new URLSearchParams(window.location.search);
    const urlUserId = params.get("id");


    if (!storedUserId) {
        window.location.href = "login.html";
        return;
    }


    if (urlUserId && urlUserId !== storedUserId) {
        alert("Unauthorized access detected!");
        window.location.href = "login.html";
        return;
    }


    userId = storedUserId;
    role = storedRole;


    window.history.replaceState({}, document.title, "dashboard.html");
}


    function goToPassbook() {
        window.location.href = "passbook.html";
    }


   window.addEventListener('DOMContentLoaded', () => {
    validateUserAccess();
    loadDashboard();
});


    window.addEventListener('click', (e) => {
        const withdrawModal = document.getElementById('withdrawModal');
        const depositModal = document.getElementById('depositModal');
        const transferModal = document.getElementById('transferModal');
        const updateModal = document.getElementById('updateModal');

        if (e.target === withdrawModal) withdrawModal.classList.remove('show');
        if (e.target === depositModal) depositModal.classList.remove('show');
        if (e.target === transferModal) transferModal.classList.remove('show');
        if (e.target === updateModal) updateModal.classList.remove('show');
    });

    document.getElementById('updateForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const key = document.getElementById('updateKey').value;
            const value = document.getElementById('updateValue').value;

            const updateData = {
                id: parseInt(userId),
                key: key,
                value: value
            };

            try {
                const response = await fetch(`${API_URL}/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updateData)
                });
                const result = await response.text();
                if (response.ok && result && result.toLowerCase().includes('successfully')) {
                    showMessage('dashMessage', 'Profile updated successfully!', 'success');
                    closeUpdateModal();
                    loadDashboard();
                } else {
                    showMessage('dashMessage', result || 'Update failed', 'error');
                }
            } catch (error) {
                showMessage('dashMessage', 'Error updating profile', 'error');
                console.error('Update error:', error);
            }
        });
