<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Virtual Banking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2847 50%, #2d1b4e 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            overflow: hidden;
            box-shadow:
                0 0 60px rgba(102, 126, 234, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
            backdrop-filter: blur(20px);
            padding: 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            flex-wrap: wrap;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.5), transparent);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-header {
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            min-height: 42px;
        }

        .btn-header:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        .content {
            padding: 40px 30px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            background: transparent;
        }

        .history-table thead {
            background: rgba(102, 126, 234, 0.2);
            border-bottom: 1.5px solid rgba(102, 126, 234, 0.3);
        }

        .history-table th {
            padding: 16px 15px;
            text-align: left;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            color: rgba(167, 139, 250, 1);
        }

        .history-table tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .history-table tbody tr:hover {
            background-color: rgba(102, 126, 234, 0.1);
            box-shadow: inset 0 0 20px rgba(102, 126, 234, 0.1);
        }

        .history-table td {
            padding: 14px 15px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .history-table td:first-child {
            font-weight: 700;
            color: rgba(167, 139, 250, 1);
            width: 70px;
        }

        .history-table td:nth-child(2) {
            color: rgba(255, 255, 255, 0.8);
            word-break: break-word;
        }

        .date {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            white-space: nowrap;
        }

        .history-empty {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
        }

        .history-empty::before {
            content: '📋';
            display: block;
            font-size: 48px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .header h1 {
                font-size: 24px;
            }

            .history-table th,
            .history-table td {
                padding: 10px;
                font-size: 12px;
            }

            .content {
                padding: 30px 20px;
            }

            .table-wrapper {
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            .container {
                border-radius: 16px;
            }

            .content {
                padding: 20px 15px;
            }

            .header {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 History</h1>
        <div>
            <button class="btn-header" onclick="goBackToAdmin()">← Back</button>
        </div>
    </div>
    <div class="content">
        <div id="historyMessage" class="history-empty" style="display:none"></div>
        <div class="table-wrapper">
            <table class="history-table" id="historyTable">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Description</th>
                    <th>Date</th>
                </tr>
                </thead>
                <tbody id="historyBody">
                <tr>
                    <td colspan="3" class="history-empty">Loading history...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8081';
    let userId = null;

    function getUserIdFromURL() {
        const params = new URLSearchParams(window.location.search);
        const urlUserId = params.get('id');
        const storedUserId = localStorage.getItem('userId');
        userId = storedUserId || urlUserId;
    }

    function goBackToAdmin() {
        const params = new URLSearchParams();
        if (userId) params.set('id', userId);
        params.set('role', 'admin');
        window.location.href = `admin.html?${params.toString()}`;
    }

    async function loadHistories() {
        try {
            const res = await fetch(`${API_URL}/histories`);
            if (!res.ok) throw new Error('Failed to load histories');
            const histories = await res.json();
            renderHistories(histories);
        } catch (err) {
            console.error(err);
            const body = document.getElementById('historyBody');
            body.innerHTML = `<tr><td colspan="3" class="history-empty">Unable to load history. Ensure backend is running.</td></tr>`;
        }
    }

    function renderHistories(list) {
        const body = document.getElementById('historyBody');
        if (!list || list.length === 0) {
            body.innerHTML = `<tr><td colspan="3" class="history-empty">No history records found.</td></tr>`;
            return;
        }

        body.innerHTML = list.map(h => `
            <tr>
                <td>#${h.id}</td>
                <td>${escapeHtml(h.description)}</td>
                <td class="date">${formatDate(h.date)}</td>
            </tr>
        `).join('');
    }

    function formatDate(d) {
        if (!d) return '';
        const dt = new Date(d);
        if (isNaN(dt)) return d;
        return dt.toLocaleString();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, function(c) {
            return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c];
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        getUserIdFromURL();
        loadHistories();
    });
</script>
</body>
</html>
